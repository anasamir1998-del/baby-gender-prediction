<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - الصفحة غير موجودة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Tajawal', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #e0c3fc, #8ec5fc);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
        }
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .container {
            text-align: center;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 48px 36px;
            box-shadow: 0 20px 60px rgba(100,80,160,0.25);
            max-width: 400px;
            width: 90%;
        }
        .emoji { font-size: 4rem; margin-bottom: 16px; }
        h1 { color: #1e1b4b; font-size: 1.8rem; margin-bottom: 12px; }
        p { color: #6b7280; margin-bottom: 24px; }
        a {
            display: inline-block;
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            color: white;
            text-decoration: none;
            padding: 14px 36px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 1.1rem;
            transition: all 0.3s;
        }
        a:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(124,58,237,0.4); }
    </style>
</head>
<body>
    <div class="container">
        <div class="emoji">🔍</div>
        <h1>الصفحة غير موجودة</h1>
        <p>عذراً، الصفحة اللي تدور عليها مش موجودة</p>
        <a href="/">الرجوع للرئيسية</a>
    </div>
</body>
</html>
